services:
  dev:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    working_dir: /workspace
    command: >
      sh -lc "
        curl -fsSL $$GIT_CRED_PROXY_INSTALL_URL/container/install.sh | sh &&
        $$INSTALL_DIR/configure-git.sh --global &&
        sleep infinity
      "
    tty: true
    stdin_open: true
    environment:
      INSTALL_DIR: ${INSTALL_DIR:-/usr/local/bin}
      GIT_CRED_PROXY_INSTALL_URL: ${GIT_CRED_PROXY_INSTALL_URL:-http://host.docker.internal:18765}
      GIT_CRED_PROXY_URL: ${GIT_CRED_PROXY_URL:-http://host.docker.internal:18765}
      GIT_CRED_PROXY_TOKEN_FILE: /run/host-git-cred-proxy/token
    volumes:
      - .:/workspace
      - ${HOST_GIT_CRED_PROXY_TOKEN_DIR}:/run/host-git-cred-proxy:ro
